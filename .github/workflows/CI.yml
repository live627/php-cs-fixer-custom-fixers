name: CI

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          coverage: none
          tools: cs2pr

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP-CS-Fixer (dry-run)
        run: vendor/bin/php-cs-fixer fix --dry-run --allow-risky=yes --format=checkstyle | cs2pr

      - uses: mheap/phpunit-matcher-action@v1

      - name: Enable Xdebug
        run: |
          phpenv config-rm xdebug.ini || true
          echo "xdebug.mode=coverage" >> "$(php --ini | grep 'Loaded Configuration' | awk '{print $4}')"

      - name: PHPUnit
        id: phpunit
        run: |
          vendor/bin/phpunit \
            --coverage-clover coverage.clover.xml \
            --coverage-text \
            --log-teamcity teamcity.log

      - name: Show TeamCity log
        if: steps.phpunit.outcome == 'failure'
        run: cat teamcity.log

      - name: Install Ocular
        run: composer require --dev uma/ocular:^2

      - name: Upload coverage
        run: php vendor/bin/ocular code-coverage:upload --format=php-clover coverage.clover.xml
